---
# Phase 1: Set up HTTP-only config for ACME challenge before TLS

- name: Create certbot webroot
  file:
    path: /var/www/certbot
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Remove nginx default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Deploy HTTP-only nginx config for ACME challenge
  copy:
    dest: "/etc/nginx/sites-available/{{ git_domain }}"
    content: |
      server {
          listen 80;
          server_name {{ git_domain }};

          location /.well-known/acme-challenge/ {
              root /var/www/certbot;
          }

          location / {
              return 301 https://$host$request_uri;
          }
      }
    mode: "0644"

- name: Enable Git server site
  file:
    src: "/etc/nginx/sites-available/{{ git_domain }}"
    dest: "/etc/nginx/sites-enabled/{{ git_domain }}"
    state: link

- name: Ensure nginx is started
  service:
    name: nginx
    state: started
    enabled: true

- name: Validate and reload nginx for ACME
  block:
    - name: Test nginx config
      command: nginx -t
      changed_when: false
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

# Phase 2: TLS setup (certbot or self-signed)

- name: Include TLS setup
  include_tasks: ../../common/tls_setup.yml
  vars:
    _tls_domain: "{{ git_domain }}"

# Phase 3: Deploy full HTTPS config

- name: Deploy Git server nginx config (HTTPS)
  copy:
    dest: "/etc/nginx/sites-available/{{ git_domain }}"
    content: |
      server {
          listen 80;
          server_name {{ git_domain }};

          location /.well-known/acme-challenge/ {
              root /var/www/certbot;
          }

          location / {
              return 301 https://$host$request_uri;
          }
      }

      server {
          listen 443 ssl;
          http2 on;
          server_name {{ git_domain }};

          ssl_certificate     {{ _ssl_cert }};
          ssl_certificate_key {{ _ssl_key }};
          ssl_protocols       TLSv1.2 TLSv1.3;
          ssl_session_cache   shared:SSL:10m;

          # Security headers
          {% if _is_selfsigned | default(false) | bool %}
          add_header Strict-Transport-Security "max-age=0" always;
          {% else %}
          add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
          {% endif %}
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

          server_tokens off;

          client_max_body_size 100m;

          {% if git_platform == 'forgejo' %}
          # Block info-leaking endpoints
          location /api/v1/version { return 404; }
          location /.well-known/nodeinfo { return 404; }
          {% endif %}

          {% if git_platform == 'gitlab' %}
          # Block info-leaking endpoints
          location /help { return 404; }
          location /explore { return 404; }
          location /-/health { return 404; }
          location /-/readiness { return 404; }
          location /-/liveness { return 404; }
          {% endif %}

          location / {
              proxy_pass http://127.0.0.1:{{ git_local_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;

              # WebSocket support
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";

              proxy_buffering off;
              proxy_request_buffering off;
          }
      }
    mode: "0644"

- name: Validate final nginx config
  command: nginx -t
  changed_when: false

- name: Reload nginx with HTTPS config
  service:
    name: nginx
    state: reloaded
