---
# Post-deployment tasks — runs AFTER all service playbooks complete
# Kept separate so apt-locking services don't interfere with deployment
#
# IMPORTANT: unattended-upgrades systemd timers are configured with
# Persistent=false and a specific OnCalendar time so they do NOT fire
# immediately on fresh installs (which would cause apt lock races).

- name: Post-Deployment Setup
  hosts: all
  become: true

  tasks:
    - name: Install unattended-upgrades
      apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present
      when: ansible_os_family == "Debian"
      ignore_errors: true

    - name: Enable unattended upgrades for security
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        mode: "0644"
      when: ansible_os_family == "Debian"

    # ─── Schedule apt timers for off-peak hours, not immediately ─────
    # Override apt-daily.timer: run package list update at 4:00 AM
    - name: Create systemd override directory for apt-daily.timer
      file:
        path: /etc/systemd/system/apt-daily.timer.d
        state: directory
        mode: "0755"
      when: ansible_os_family == "Debian"

    - name: Configure apt-daily.timer to run at 4 AM (not immediately)
      copy:
        dest: /etc/systemd/system/apt-daily.timer.d/override.conf
        content: |
          [Timer]
          OnCalendar=
          OnCalendar=*-*-* 04:00:00
          RandomizedDelaySec=30m
          Persistent=false
        mode: "0644"
      when: ansible_os_family == "Debian"

    # Override apt-daily-upgrade.timer: run actual upgrades at 5:00 AM
    - name: Create systemd override directory for apt-daily-upgrade.timer
      file:
        path: /etc/systemd/system/apt-daily-upgrade.timer.d
        state: directory
        mode: "0755"
      when: ansible_os_family == "Debian"

    - name: Configure apt-daily-upgrade.timer to run at 5 AM (not immediately)
      copy:
        dest: /etc/systemd/system/apt-daily-upgrade.timer.d/override.conf
        content: |
          [Timer]
          OnCalendar=
          OnCalendar=*-*-* 05:00:00
          RandomizedDelaySec=30m
          Persistent=false
        mode: "0644"
      when: ansible_os_family == "Debian"

    - name: Reload systemd daemon after timer overrides
      systemd:
        daemon_reload: true
      when: ansible_os_family == "Debian"

    - name: Enable apt-daily timers (will fire at scheduled time, not now)
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      when: ansible_os_family == "Debian"

    - name: Deploy maintenance routine
      include_tasks: setup_maintenance.yml
