---
# Nextcloud package and dependency installation

- name: Wait for apt locks
  include_tasks: ../../common/tasks/wait_for_apt.yml

- name: Update apt cache
  command: apt-get update
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Install Nextcloud dependencies
  apt:
    name:
      - php-fpm
      - php-xml
      - php-mbstring
      - php-gd
      - php-curl
      - php-zip
      - php-intl
      - php-mysql
      - php-redis
      - php-apcu
      - php-imagick
      - php-bcmath
      - php-gmp
      - mariadb-server
      - python3-pymysql
      - redis-server
      - nginx
      - certbot
      - python3-certbot-nginx
      - unzip
      - curl
      - ca-certificates
    state: present
  when: ansible_os_family == "Debian"

- name: Detect installed PHP version
  command: php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;'
  register: _php_ver_result
  changed_when: false

- name: Set PHP version fact
  set_fact:
    php_ver: "{{ _php_ver_result.stdout }}"

- name: Enable and start MariaDB
  service:
    name: mariadb
    state: started
    enabled: true

- name: Enable and start Redis
  service:
    name: redis-server
    state: started
    enabled: true

- name: Enable APCu for PHP CLI
  shell: phpenmod apcu
  changed_when: true
  ignore_errors: true

- name: Enable and start PHP-FPM
  service:
    name: "php{{ php_ver }}-fpm"
    state: started
    enabled: true

- name: Get latest Nextcloud version
  uri:
    url: https://download.nextcloud.com/server/releases/latest.tar.bz2.sha256
    return_content: true
  register: nc_checksum_response

- name: Parse Nextcloud checksum
  set_fact:
    nc_checksum: "{{ nc_checksum_response.content.split()[0] }}"

- name: Download Nextcloud tarball
  get_url:
    url: https://download.nextcloud.com/server/releases/latest.tar.bz2
    dest: /tmp/nextcloud.tar.bz2
    checksum: "sha256:{{ nc_checksum }}"
    mode: "0644"

- name: Extract Nextcloud
  unarchive:
    src: /tmp/nextcloud.tar.bz2
    dest: /var/www/
    remote_src: true
    creates: /var/www/nextcloud/index.php

- name: Set Nextcloud ownership
  file:
    path: /var/www/nextcloud
    state: directory
    owner: www-data
    group: www-data
    recurse: true

- name: Create Nextcloud data directory
  file:
    path: /var/www/nextcloud/data
    state: directory
    owner: www-data
    group: www-data
    mode: "0770"

- name: Allow HTTP/HTTPS through UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
