---
# Vaultwarden installation via Docker

- name: Install prerequisites
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
      - curl
      - ca-certificates
      - gnupg
      - argon2
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker apt repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    mode: "0644"

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: true

- name: Enable and start Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Create Vaultwarden data directory
  file:
    path: /opt/vaultwarden/data
    state: directory
    mode: "0750"

- name: Generate Argon2id hash of admin token
  shell: >
    echo -n "{{ vaultwarden_admin_token }}" |
    argon2 "$(openssl rand -base64 32)" -e -id -k 65540 -t 3 -p 4
  register: vw_hashed_token
  changed_when: false
  no_log: true

- name: Run Vaultwarden container
  command: >
    docker run -d
    --name vaultwarden
    --restart unless-stopped
    -v /opt/vaultwarden/data:/data
    -p 127.0.0.1:8081:80
    -e DOMAIN=https://{{ vaultwarden_domain }}
    -e SIGNUPS_ALLOWED={{ vaultwarden_signups | lower }}
    -e ADMIN_TOKEN={{ vw_hashed_token.stdout | trim }}
    -e LOG_FILE=/data/vaultwarden.log
    -e LOG_LEVEL=warn
    -e SENDS_ALLOWED=true
    -e EMERGENCY_ACCESS_ALLOWED=true
    -e WEBSOCKET_ENABLED=true
    vaultwarden/server:latest
  register: vw_container
  changed_when: vw_container.rc == 0
  failed_when: false

- name: Check if container already exists
  command: docker start vaultwarden
  when: vw_container.rc != 0
  changed_when: false

- name: Wait for Vaultwarden to be ready
  wait_for:
    port: 8081
    host: 127.0.0.1
    delay: 3
    timeout: 30

- name: Allow HTTP/HTTPS through UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
