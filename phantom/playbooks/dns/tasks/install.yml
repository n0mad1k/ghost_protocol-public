---
# AdGuard Home installation (native binary)

- name: Wait for apt locks
  include_tasks: ../../common/tasks/wait_for_apt.yml

- name: Update apt cache
  command: apt-get update
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Install prerequisites
  apt:
    name:
      - curl
      - ca-certificates
      - nginx
      - certbot
      - python3-certbot-nginx
      - fail2ban
      - python3-passlib
    state: present
  when: ansible_os_family == "Debian"

- name: Stop systemd-resolved (conflicts with AdGuard Home on port 53)
  service:
    name: systemd-resolved
    state: stopped
    enabled: false
  failed_when: false

- name: Configure /etc/resolv.conf for local DNS
  copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 127.0.0.1
      nameserver 9.9.9.9
      nameserver 1.1.1.1
    mode: "0644"

- name: Create AdGuard Home directory
  file:
    path: /opt/AdGuardHome
    state: directory
    mode: "0755"

- name: Detect system architecture
  set_fact:
    adguard_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else 'armv7' }}"

- name: Download AdGuard Home
  get_url:
    url: "https://static.adtidy.org/adguardhome/release/AdGuardHome_linux_{{ adguard_arch }}.tar.gz"
    dest: /tmp/AdGuardHome.tar.gz
    mode: "0644"
  when: not ansible_check_mode

- name: Extract AdGuard Home binary
  unarchive:
    src: /tmp/AdGuardHome.tar.gz
    dest: /opt/
    remote_src: true
    creates: /opt/AdGuardHome/AdGuardHome

- name: Set binary permissions
  file:
    path: /opt/AdGuardHome/AdGuardHome
    mode: "0755"

- name: Create AdGuard Home systemd service
  copy:
    dest: /etc/systemd/system/AdGuardHome.service
    content: |
      [Unit]
      Description=AdGuard Home: Network-level blocker
      After=syslog.target network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      WorkingDirectory=/opt/AdGuardHome
      ExecStart=/opt/AdGuardHome/AdGuardHome -c /opt/AdGuardHome/AdGuardHome.yaml -w /opt/AdGuardHome --no-check-update
      Restart=on-failure
      RestartSec=10
      LimitNOFILE=65535
      AmbientCapabilities=CAP_NET_BIND_SERVICE CAP_NET_RAW

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: restart adguardhome

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Clean up downloaded archive
  file:
    path: /tmp/AdGuardHome.tar.gz
    state: absent

- name: Allow DNS through UFW
  ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "53", proto: "tcp" }
    - { port: "53", proto: "udp" }

- name: Allow HTTP/HTTPS through UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

- name: Allow DNS-over-TLS through UFW
  ufw:
    rule: allow
    port: "853"
    proto: tcp

- name: Allow AdGuard Home initial setup UI
  ufw:
    rule: allow
    port: "3000"
    proto: tcp
