---
# Nginx reverse proxy for AdGuard Home (DoH/DoT)

- name: Create certbot webroot
  file:
    path: /var/www/certbot
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Deploy HTTP-only nginx config (for certbot)
  copy:
    dest: /etc/nginx/sites-available/adguard
    content: |
      server {
          listen 80;
          server_name {{ dns_domain }};
          location /.well-known/acme-challenge/ { root /var/www/certbot; }
          location / { return 503; }
      }
    mode: "0644"
  notify: reload nginx

- name: Enable AdGuard nginx site
  file:
    src: /etc/nginx/sites-available/adguard
    dest: /etc/nginx/sites-enabled/adguard
    state: link
  notify: reload nginx

- name: Flush handlers to apply HTTP config
  meta: flush_handlers

- name: Setup TLS (certbot with self-signed fallback)
  include_tasks: ../../common/tls_setup.yml
  vars:
    _tls_domain: "{{ dns_domain }}"

- name: Deploy SSL nginx config
  copy:
    dest: /etc/nginx/sites-available/adguard
    content: |
      server {
          listen 80;
          server_name {{ dns_domain }};
          location /.well-known/acme-challenge/ { root /var/www/certbot; }
          location / { return 301 https://$host$request_uri; }
      }

      server {
          listen 443 ssl;
          http2 on;
          server_name {{ dns_domain }};

          ssl_certificate {{ _ssl_cert }};
          ssl_certificate_key {{ _ssl_key }};
          ssl_protocols TLSv1.2 TLSv1.3;

          server_tokens off;
          {% if _is_selfsigned | default(false) | bool %}
          add_header Strict-Transport-Security "max-age=0" always;
          {% else %}
          add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
          {% endif %}
          add_header X-Content-Type-Options nosniff always;
          add_header X-Frame-Options SAMEORIGIN always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

          client_max_body_size 10m;

          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }

          location /dns-query {
              proxy_pass http://127.0.0.1:3000/dns-query;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }
    mode: "0644"
  notify: reload nginx
