---
# AdGuard Home configuration

- name: Stop AdGuard Home for configuration
  service:
    name: AdGuardHome
    state: stopped
  failed_when: false

- name: Generate admin password if not set
  shell: LC_ALL=C tr -dc A-Za-z0-9 < /dev/urandom | head -c 24
  register: adguard_password_gen
  args:
    creates: /opt/AdGuardHome/.phantom_password

- name: Save admin password
  copy:
    content: "{{ adguard_password_gen.stdout }}"
    dest: /opt/AdGuardHome/.phantom_password
    mode: "0600"
  when: adguard_password_gen.changed

- name: Read saved password
  slurp:
    src: /opt/AdGuardHome/.phantom_password
  register: adguard_password_file

- name: Set admin password fact
  set_fact:
    adguard_admin_password: "{{ (adguard_password_file.content | b64decode).strip() }}"

- name: Generate bcrypt hash for admin password
  command: "python3 -c \"from passlib.hash import bcrypt; print(bcrypt.using(rounds=10).hash('{{ adguard_admin_password }}'))\""
  register: adguard_bcrypt_result
  changed_when: false
  no_log: true

- name: Set bcrypt hash fact
  set_fact:
    adguard_bcrypt_hash: "{{ adguard_bcrypt_result.stdout }}"

- name: Parse upstream DNS servers
  set_fact:
    adguard_upstream: "{{ adguard_upstream_dns.split(';') }}"

- name: Set blocklist level
  set_fact:
    adguard_blocklist: "{{ dns_blocklist | default('standard') }}"

- name: Deploy AdGuard Home configuration
  template:
    src: ../templates/AdGuardHome.yaml.j2
    dest: /opt/AdGuardHome/AdGuardHome.yaml
    mode: "0600"
  notify: restart adguardhome

- name: Start and enable AdGuard Home
  service:
    name: AdGuardHome
    state: started
    enabled: true

- name: Wait for AdGuard Home to be ready
  wait_for:
    port: 3000
    host: 127.0.0.1
    delay: 3
    timeout: 30

- name: Include nginx reverse proxy configuration
  include_tasks: nginx.yml
  when: dns_domain is defined and dns_domain != ""

- name: Display admin credentials
  debug:
    msg: >-
      AdGuard Home admin password saved to /opt/AdGuardHome/.phantom_password —
      {{ 'access admin at https://' + dns_domain if (dns_domain is defined and dns_domain) else 'access admin at http://' + (ansible_default_ipv4.address | default('server_ip')) + ':3000' }}
