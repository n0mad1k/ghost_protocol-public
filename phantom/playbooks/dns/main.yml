---
# AdGuard Home DNS server deployment (native binary)

- name: Deploy AdGuard Home DNS Server
  hosts: all
  become: true
  vars:
    adguard_upstream_dns: "{{ dns_upstream | default('9.9.9.9;149.112.112.112') }}"
    dns_domain: "{{ dns_domain | default('') }}"
    dns_blocklist: "{{ dns_blocklist | default('standard') }}"
    target_host: "{{ target_host | default('localhost') }}"

  tasks:
    - name: Include AdGuard Home installation
      include_tasks: tasks/install.yml

    - name: Configure Cloudflare Tunnel
      include_tasks: ../common/tasks/cloudflare_tunnel.yml
      when: cf_tunnel_token is defined and cf_tunnel_token != ""

    - name: Include AdGuard Home configuration
      include_tasks: tasks/configure.yml

  handlers:
    - name: restart adguardhome
      service:
        name: AdGuardHome
        state: restarted

    - name: reload nginx
      service:
        name: nginx
        state: reloaded
