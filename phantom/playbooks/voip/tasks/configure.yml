---
# izPBX configuration — admin password, SIP trunk, outbound route

- name: Wait for FreePBX to be ready
  command: docker exec izpbx-izpbx-1 fwconsole ma list
  register: _fpbx_ready
  retries: 30
  delay: 10
  until: _fpbx_ready.rc == 0
  changed_when: false

- name: Generate admin password (if not provided)
  shell: LC_ALL=C tr -dc A-Za-z0-9 < /dev/urandom | head -c 24
  register: _izpbx_admin_pass_gen
  args:
    creates: /root/.izpbx_admin_password
  when: (izpbx_admin_password | default('')) == ''

- name: Save generated admin password
  copy:
    content: "{{ _izpbx_admin_pass_gen.stdout }}"
    dest: /root/.izpbx_admin_password
    mode: "0600"
  when: (izpbx_admin_password | default('')) == '' and _izpbx_admin_pass_gen.changed

- name: Save provided admin password
  copy:
    content: "{{ izpbx_admin_password }}"
    dest: /root/.izpbx_admin_password
    mode: "0600"
  when: (izpbx_admin_password | default('')) != ''

- name: Read admin password
  slurp:
    src: /root/.izpbx_admin_password
  register: _izpbx_admin_pass_file

- name: Set admin password fact
  set_fact:
    _izpbx_admin_pass: "{{ (_izpbx_admin_pass_file.content | b64decode).strip() }}"

- name: Set FreePBX admin password
  command: >
    docker exec izpbx-izpbx-1 fwconsole admin -u admin -p {{ _izpbx_admin_pass }}
  no_log: true
  changed_when: true

- name: Deploy SIP trunk setup script
  copy:
    dest: /opt/izpbx/setup-trunk.sh
    mode: "0755"
    content: |
      #!/bin/bash
      # SIP trunk setup — generated by Phantom
      # Idempotent: checks for existing trunk before insert
      set -euo pipefail

      PROVIDER="{{ izpbx_sip_provider }}"
      SIP_HOST="{{ izpbx_sip_host }}"
      SIP_PORT="{{ izpbx_sip_port }}"
      SIP_USER="{{ izpbx_sip_username }}"
      SIP_PASS="{{ izpbx_sip_password }}"
      SIP_TRANSPORT="{{ izpbx_sip_transport }}"
      TRUNK_NAME="phantom-${PROVIDER}"

      # MySQL credentials from izPBX env
      DB_USER="asterisk"
      DB_PASS="{{ (_izpbx_db_pass_file.content | b64decode).strip() }}"
      DB_NAME="asterisk"

      mysql_cmd() {
        docker exec izpbx-db-1 mysql -u"${DB_USER}" -p"${DB_PASS}" "${DB_NAME}" -sNe "$1"
      }

      # Check if trunk already exists
      EXISTING=$(mysql_cmd "SELECT COUNT(*) FROM trunks WHERE name='${TRUNK_NAME}';" 2>/dev/null || echo "0")
      if [ "${EXISTING}" -gt 0 ]; then
        echo "Trunk '${TRUNK_NAME}' already exists — skipping creation."
        docker exec izpbx-izpbx-1 fwconsole reload
        exit 0
      fi

      echo "Creating SIP trunk: ${TRUNK_NAME} (${PROVIDER})"

      # Get next trunk ID
      NEXT_ID=$(mysql_cmd "SELECT COALESCE(MAX(trunkid),0)+1 FROM trunks;" 2>/dev/null || echo "1")

      # Insert trunk record
      mysql_cmd "INSERT INTO trunks (trunkid, tech, channelid, name, outcid, maxchans, dialoutprefix, keepcid, provider, disabled)
        VALUES (${NEXT_ID}, 'pjsip', '${TRUNK_NAME}', '${TRUNK_NAME}', '', 0, '', 'off', '${PROVIDER}', 'off');"

      # PJSIP endpoint
      mysql_cmd "INSERT INTO pjsip (id, keyword, data, flags) VALUES
        ('${TRUNK_NAME}', 'type', 'endpoint', 2),
        ('${TRUNK_NAME}', 'transport', '0.0.0.0-${SIP_TRANSPORT}', 2),
        ('${TRUNK_NAME}', 'context', 'from-pstn', 2),
        ('${TRUNK_NAME}', 'disallow', 'all', 2),
        ('${TRUNK_NAME}', 'allow', 'ulaw,alaw,g729', 2),
        ('${TRUNK_NAME}', 'auth', '${TRUNK_NAME}_auth', 2),
        ('${TRUNK_NAME}', 'aors', '${TRUNK_NAME}_aor', 2),
        ('${TRUNK_NAME}', 'outbound_auth', '${TRUNK_NAME}_auth', 2);"

      # PJSIP auth
      mysql_cmd "INSERT INTO pjsip (id, keyword, data, flags) VALUES
        ('${TRUNK_NAME}_auth', 'type', 'auth', 2),
        ('${TRUNK_NAME}_auth', 'auth_type', 'userpass', 2),
        ('${TRUNK_NAME}_auth', 'username', '${SIP_USER}', 2),
        ('${TRUNK_NAME}_auth', 'password', '${SIP_PASS}', 2);"

      # PJSIP AOR (address of record)
      mysql_cmd "INSERT INTO pjsip (id, keyword, data, flags) VALUES
        ('${TRUNK_NAME}_aor', 'type', 'aor', 2),
        ('${TRUNK_NAME}_aor', 'contact', 'sip:${SIP_HOST}:${SIP_PORT}', 2),
        ('${TRUNK_NAME}_aor', 'qualify_frequency', '60', 2);"

      # Registration (not needed for Twilio — uses IP auth)
      if [ "${PROVIDER}" != "twilio" ]; then
        mysql_cmd "INSERT INTO pjsip (id, keyword, data, flags) VALUES
          ('${TRUNK_NAME}_reg', 'type', 'registration', 2),
          ('${TRUNK_NAME}_reg', 'transport', '0.0.0.0-${SIP_TRANSPORT}', 2),
          ('${TRUNK_NAME}_reg', 'outbound_auth', '${TRUNK_NAME}_auth', 2),
          ('${TRUNK_NAME}_reg', 'server_uri', 'sip:${SIP_HOST}:${SIP_PORT}', 2),
          ('${TRUNK_NAME}_reg', 'client_uri', 'sip:${SIP_USER}@${SIP_HOST}:${SIP_PORT}', 2),
          ('${TRUNK_NAME}_reg', 'retry_interval', '60', 2),
          ('${TRUNK_NAME}_reg', 'expiration', '3600', 2);"
      fi

      echo "Trunk created successfully."

      # Create default outbound route (match-all pattern)
      ROUTE_EXISTS=$(mysql_cmd "SELECT COUNT(*) FROM outbound_routes WHERE name='phantom-default';" 2>/dev/null || echo "0")
      if [ "${ROUTE_EXISTS}" -eq 0 ]; then
        echo "Creating default outbound route..."
        ROUTE_ID=$(mysql_cmd "SELECT COALESCE(MAX(route_id),0)+1 FROM outbound_routes;" 2>/dev/null || echo "1")
        mysql_cmd "INSERT INTO outbound_routes (route_id, name, outcid, outcid_mode, password, emergency_route, intracompany_route, mohclass, time_group_id, seq)
          VALUES (${ROUTE_ID}, 'phantom-default', '', 'override', '', 'NO', 'NO', 'default', NULL, 0);"
        mysql_cmd "INSERT INTO outbound_route_trunks (route_id, trunk_id, seq) VALUES (${ROUTE_ID}, ${NEXT_ID}, 0);"
        mysql_cmd "INSERT INTO outbound_route_patterns (route_id, match_pattern_prefix, match_pattern_pass, match_cid, prepend_digits, seq)
          VALUES (${ROUTE_ID}, '', 'X.', '', '', 0);"
        echo "Default outbound route created (match-all pattern X. -> ${TRUNK_NAME})"
      fi

      # Reload FreePBX
      docker exec izpbx-izpbx-1 fwconsole reload
      echo "FreePBX reloaded."

- name: Run SIP trunk setup
  command: bash /opt/izpbx/setup-trunk.sh
  register: _trunk_setup
  changed_when: "'already exists' not in _trunk_setup.stdout"

- name: Display izPBX credentials and next steps
  debug:
    msg: |
      ===================================================
        izPBX deployed successfully.

        Web UI:     https://{{ izpbx_hostname }}
        Admin user: admin
        Admin pass: see /root/.izpbx_admin_password

        SIP Provider: {{ izpbx_sip_provider }}
      {% if izpbx_sip_host %}
        SIP Host:     {{ izpbx_sip_host }}:{{ izpbx_sip_port }}/{{ izpbx_sip_transport }}
      {% endif %}

        --- Next Steps ---
        1. Log in to FreePBX web UI
        2. Create extensions (Applications → Extensions)
        3. Configure inbound routes (Connectivity → Inbound Routes)
        4. Set up voicemail (Applications → Voicemail)
        5. Register SIP phones (Zoiper, Linphone, etc.)
      ===================================================
